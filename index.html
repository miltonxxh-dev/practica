<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База знаний — Практические задания</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">База знаний</span>
                </h1>
                <p class="subtitle">Практические задания по HTML, Django и SQL</p>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-wrapper">
                <div class="search-icon">🔍</div>
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Поиск по номеру, названию, технологии, условию или коду..."
                    autocomplete="off"
                >
                <button id="clearSearch" class="clear-btn" title="Очистить">✕</button>
            </div>
            
            <!-- Filters -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="HTML">HTML</button>
                <button class="filter-btn" data-filter="Django">Django</button>
                <button class="filter-btn" data-filter="SQL">SQL</button>
            </div>

            <!-- Stats -->
            <div class="stats">
                <span id="statsText">Загрузка заданий...</span>
            </div>
        </section>

        <!-- Results -->
        <main id="resultsContainer" class="results-container">
            <!-- Tasks will be rendered here -->
        </main>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">🔍</div>
            <h3>Ничего не найдено</h3>
            <p>Попробуйте изменить запрос или фильтр</p>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>База знаний для практических заданий</p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-text">Код скопирован!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
